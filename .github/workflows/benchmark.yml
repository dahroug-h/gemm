name: Benchmark Matmul (AVX2-only, Any CPU)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Print CPU info (informational only, no gating) ─────
      - name: Print CPU info
        run: |
          echo "=== CPU Model ==="
          lscpu | grep "Model name"
          echo ""
          echo "=== Cache sizes ==="
          lscpu | grep -i cache
          echo ""
          echo "=== Cores / Threads ==="
          lscpu | grep -E "^CPU\(s\)|Thread|Core"
          echo ""
          echo "=== AVX flags present ==="
          grep -o 'avx[^ ]*' /proc/cpuinfo | sort -u | head -20
          echo ""
          echo "NOTE: kernel and oneDNN both restricted to AVX2."

      # ── 3. Install system dependencies ────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libgomp1 python3-pip libdnnl-dev

      # ── 4. Install Intel MKL ───────────────────────────────────
      - name: Install Intel MKL
        run: |
          wget -q https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          sudo apt-key add GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          echo "deb https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update -qq
          sudo apt-get install -y intel-oneapi-mkl-devel

      # ── 5. Install Python packages ─────────────────────────────
      - name: Install Python packages
        run: pip3 install matplotlib numpy pandas

      # ── 6. Build autotuner ─────────────────────────────────────
      #    autotune.c includes kernel.h directly and runs it
      #    in-process — must use same AVX2 flags as the kernel.
      - name: Build autotuner
        run: |
          gcc autotune.c \
            -O3 -march=core-avx2 -mavx2 -mno-avx512f \
            -fopenmp \
            -o autotune -lm -lpthread
          echo "✅ autotune compiled"

      # ── 7. Run autotuner (~2 min) ──────────────────────────────
      #    No recompilation — all combos run in one process.
      #    Writes best params to /tmp/autotune_result.txt as:
      #      MC NC KC
      - name: Run autotuner
        run: |
          echo "Starting in-process autotune (~2 min)..."
          ./autotune 2>&1 | tee autotune_log.txt
          echo ""
          echo "=== Autotune result ==="
          cat /tmp/autotune_result.txt
          # Export to env for next step
          read BEST_MC BEST_NC BEST_KC < /tmp/autotune_result.txt
          echo "BEST_MC=$BEST_MC" >> $GITHUB_ENV
          echo "BEST_NC=$BEST_NC" >> $GITHUB_ENV
          echo "BEST_KC=$BEST_KC" >> $GITHUB_ENV

      # ── 8. Compile matmul ──────────────────────────────────────
      #    Pass MC/NC/KC as -D flags at compile time.
      #    kernel.h uses #ifndef MC guard so -DMC=X overrides
      #    the extern declaration — clean, no sed patching needed.
      - name: Compile matmul
        run: |
          source /opt/intel/oneapi/setvars.sh
          echo "Compiling with MC=$BEST_MC NC=$BEST_NC KC=$BEST_KC"
          gcc -g -fopenmp matmul.c \
            -O3 -march=core-avx2 -mavx2 -mno-avx512f \
            -DMC=$BEST_MC -DNC=$BEST_NC -DKC=$BEST_KC \
            -I$MKLROOT/include \
            -L$MKLROOT/lib/intel64 \
            -lmkl_rt -ldnnl -lpthread -lm -ldl \
            -o matmul
          echo "✅ matmul compiled (AVX2-only)"

      # ── 9. Run benchmark ───────────────────────────────────────
      #    DNNL_MAX_CPU_ISA=AVX2 caps oneDNN to AVX2 as well.
      #    Both sides strictly AVX2 — fair on any CPU.
      - name: Run benchmark
        run: |
          source /opt/intel/oneapi/setvars.sh
          export LD_LIBRARY_PATH=$MKLROOT/lib/intel64:$LD_LIBRARY_PATH
          export DNNL_MAX_CPU_ISA=AVX2
          echo "=== Machine ==="
          lscpu | grep "Model name"
          echo "=== $(nproc) logical CPUs available ==="
          echo "=== Both kernel and oneDNN: AVX2-only ==="
          echo ""
          ./matmul | tee benchmark_output.txt

      # ── 10. Generate plot ──────────────────────────────────────
      - name: Generate performance plot
        run: python3 plot.py

      # ── 11. Upload all artifacts ───────────────────────────────
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-avx2-only
          path: |
            autotune_log.txt
            benchmark_output.txt
            benchmark_results.csv
            performance_plot.png