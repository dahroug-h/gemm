name: Benchmark Matmul (AVX2-only, Any CPU)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Print CPU info (informational only, no gating) ─────
      #    No CPU rejection — -march=core-avx2 -mno-avx512f locks
      #    the binary to AVX2 on any machine. DNNL_MAX_CPU_ISA=AVX2
      #    caps oneDNN too. Both sides identical — fair everywhere.
      - name: Print CPU info
        run: |
          echo "=== CPU Model ==="
          lscpu | grep "Model name"
          echo ""
          echo "=== Cache sizes ==="
          lscpu | grep -i cache
          echo ""
          echo "=== Cores / Threads ==="
          lscpu | grep -E "^CPU\(s\)|Thread|Core"
          echo ""
          echo "=== AVX flags present ==="
          grep -o 'avx[^ ]*' /proc/cpuinfo | sort -u | head -20
          echo ""
          echo "NOTE: kernel and oneDNN both restricted to AVX2."

      # ── 3. Install system dependencies ────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libgomp1 python3-pip libdnnl-dev

      # ── 4. Install Intel MKL ───────────────────────────────────
      - name: Install Intel MKL
        run: |
          wget -q https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          sudo apt-key add GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          echo "deb https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update -qq
          sudo apt-get install -y intel-oneapi-mkl-devel

      # ── 5. Install Python packages ─────────────────────────────
      - name: Install Python packages
        run: pip3 install matplotlib numpy pandas

      # ── 6. Build autotuner ─────────────────────────────────────
      - name: Build autotuner
        run: |
          gcc autotune.c -O2 -o autotune -lm
          echo "✅ autotune compiled"

      # ── 7. Run autotuner (two-phase, ~5 min) ──────────────────
      #    Phase 1: coarse grid ~80 combos at N=1024 only (fast)
      #    Phase 2: fine ±2 steps around winner, harmonic mean
      #             across 6 sizes — ~125 combos max
      #    Total: ~200 combos, fits well within GitHub time limits
      - name: Run autotuner
        run: |
          echo "Starting two-phase autotune..."
          ./autotune 2>&1 | tee autotune_log.txt
          echo ""
          echo "=== Autotune result ==="
          cat /tmp/autotune_result.txt

      # ── 8. Patch kernel.h with best MC/NC/KC ──────────────────
      - name: Patch kernel.h with best blocking parameters
        run: |
          read BEST_MC BEST_NC BEST_KC < /tmp/autotune_result.txt

          echo "Patching kernel.h:"
          echo "  MC = $BEST_MC  NC = $BEST_NC  KC = $BEST_KC"

          echo ""
          echo "=== kernel.h BEFORE ==="
          grep -E "^#define (MC|NC|KC)" kernel.h

          sed -i "s/^#define MC[[:space:]].*/#define MC  $BEST_MC/" kernel.h
          sed -i "s/^#define NC[[:space:]].*/#define NC  $BEST_NC/" kernel.h
          sed -i "s/^#define KC[[:space:]].*/#define KC  $BEST_KC/" kernel.h

          echo ""
          echo "=== kernel.h AFTER ==="
          grep -E "^#define (MC|NC|KC)" kernel.h
          echo "✅ kernel.h patched"

      # ── 9. Compile matmul ──────────────────────────────────────
      #    -march=core-avx2 -mno-avx512f = AVX2-only regardless
      #    of what the CPU supports. No -march=native.
      - name: Compile matmul
        run: |
          source /opt/intel/oneapi/setvars.sh
          gcc -g -fopenmp matmul.c \
            -O3 -march=core-avx2 -mavx2 -mno-avx512f \
            -I$MKLROOT/include \
            -L$MKLROOT/lib/intel64 \
            -lmkl_rt -ldnnl -lpthread -lm -ldl \
            -o matmul
          echo "✅ matmul compiled (AVX2-only)"

      # ── 10. Run benchmark ──────────────────────────────────────
      #    DNNL_MAX_CPU_ISA=AVX2 caps oneDNN to AVX2 as well.
      #    Both sides strictly AVX2 — fair on any CPU.
      - name: Run benchmark
        run: |
          source /opt/intel/oneapi/setvars.sh
          export LD_LIBRARY_PATH=$MKLROOT/lib/intel64:$LD_LIBRARY_PATH
          export DNNL_MAX_CPU_ISA=AVX2
          echo "=== Machine ==="
          lscpu | grep "Model name"
          echo "=== $(nproc) logical CPUs available ==="
          echo "=== Both kernel and oneDNN: AVX2-only ==="
          echo ""
          ./matmul | tee benchmark_output.txt

      # ── 11. Generate plot ──────────────────────────────────────
      - name: Generate performance plot
        run: python3 plot.py

      # ── 12. Upload all artifacts ───────────────────────────────
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-avx2-only
          path: |
            autotune_log.txt
            benchmark_output.txt
            benchmark_results.csv
            performance_plot.png
            kernel.h