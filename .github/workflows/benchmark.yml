name: Benchmark Matmul (AVX2-only, Any CPU)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-22.04

    steps:
      # в”Ђв”Ђ 1. Checkout в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Checkout repo
        uses: actions/checkout@v4

      # в”Ђв”Ђ 2. Cache apt packages в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/benchmark.yml') }}
          restore-keys: apt-${{ runner.os }}-

      # в”Ђв”Ђ 3. Cache Intel MKL (biggest time saver ~4 min в†’ 30s) в”Ђв”Ђ
      - name: Cache Intel MKL
        id: cache-mkl
        uses: actions/cache@v4
        with:
          path: /opt/intel/oneapi
          key: mkl-oneapi-ubuntu22-2024
          restore-keys: mkl-oneapi-ubuntu22-

      # в”Ђв”Ђ 4. Print CPU info + detect thread count в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Print CPU info and detect threads
        run: |
          echo "=== CPU Model ==="
          lscpu | grep "Model name"
          echo ""
          echo "=== Cache sizes ==="
          lscpu | grep -i cache
          echo ""
          echo "=== Cores / Threads ==="
          lscpu | grep -E "^CPU\(s\)|Thread|Core"
          echo ""
          echo "=== AVX flags present ==="
          grep -o 'avx[^ ]*' /proc/cpuinfo | sort -u | head -20
          echo ""
          echo "NOTE: kernel and oneDNN both restricted to AVX2."
          echo ""
          NCORES=$(nproc)
          echo "=== Logical CPUs available: $NCORES ==="
          echo "NCORES=$NCORES" >> $GITHUB_ENV
          echo "OMP_NUM_THREADS=$NCORES" >> $GITHUB_ENV

      # в”Ђв”Ђ 5. Install system dependencies + perf tools в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libgomp1 python3-pip libdnnl-dev \
            linux-tools-common linux-tools-generic linux-tools-$(uname -r) || \
          sudo apt-get install -y linux-tools-common linux-tools-generic
          # allow perf without sudo
          sudo sh -c 'echo 0 > /proc/sys/kernel/perf_event_paranoid'
          sudo sh -c 'echo 0 > /proc/sys/kernel/kptr_restrict'

      # в”Ђв”Ђ 6. Install Intel MKL (skipped if cached) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Install Intel MKL
        if: steps.cache-mkl.outputs.cache-hit != 'true'
        run: |
          echo "MKL not cached вЂ” installing..."
          wget -q https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          sudo apt-key add GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          echo "deb https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update -qq
          sudo apt-get install -y intel-oneapi-mkl-devel
          echo "вњ… MKL installed"

      - name: Setup MKL (always needed even when cached)
        run: |
          echo "вњ… MKL ready at /opt/intel/oneapi"
          ls /opt/intel/oneapi/setvars.sh

      # в”Ђв”Ђ 7. Install Python packages в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Install Python packages
        run: pip3 install matplotlib numpy pandas

      # в”Ђв”Ђ 8. Build autotuner в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build autotuner
        run: |
          gcc autotune.c \
            -O3 -march=core-avx2 -mavx2 -mno-avx512f \
            -fopenmp \
            -DNTHREADS=$NCORES \
            -o autotune -lm -lpthread
          echo "вњ… autotune compiled with NTHREADS=$NCORES"

      # в”Ђв”Ђ 9. Run autotuner в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Run autotuner
        run: |
          export OMP_NUM_THREADS=$NCORES
          echo "Starting parallel in-process autotune with $NCORES threads..."
          ./autotune 2>&1 | tee autotune_log.txt
          echo ""
          echo "=== Autotune result ==="
          cat /tmp/autotune_result.txt
          read BEST_MC BEST_NC BEST_KC < /tmp/autotune_result.txt
          echo "BEST_MC=$BEST_MC" >> $GITHUB_ENV
          echo "BEST_NC=$BEST_NC" >> $GITHUB_ENV
          echo "BEST_KC=$BEST_KC" >> $GITHUB_ENV

      # в”Ђв”Ђ 10. Compile matmul в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      #    -g keeps debug symbols so perf can resolve function names
      - name: Compile matmul
        run: |
          source /opt/intel/oneapi/setvars.sh
          echo "Compiling with MC=$BEST_MC NC=$BEST_NC KC=$BEST_KC NTHREADS=$NCORES"
          gcc -g -fopenmp matmul.c \
            -O3 -march=core-avx2 -mavx2 -mno-avx512f \
            -DMC=$BEST_MC -DNC=$BEST_NC -DKC=$BEST_KC \
            -DNTHREADS=$NCORES \
            -I$MKLROOT/include \
            -L$MKLROOT/lib/intel64 \
            -lmkl_rt -ldnnl -lpthread -lm -ldl \
            -o matmul
          echo "вњ… matmul compiled (AVX2-only, $NCORES threads)"

      # в”Ђв”Ђ 11. Run benchmark в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Run benchmark
        run: |
          source /opt/intel/oneapi/setvars.sh
          export LD_LIBRARY_PATH=$MKLROOT/lib/intel64:$LD_LIBRARY_PATH
          export DNNL_MAX_CPU_ISA=AVX2
          export OMP_NUM_THREADS=$NCORES
          echo "=== Machine ==="
          lscpu | grep "Model name"
          echo "=== Threads: $NCORES ==="
          echo "=== Both kernel and oneDNN: AVX2-only ==="
          echo ""
          ./matmul | tee benchmark_output.txt

      # в”Ђв”Ђ 12. Perf profiling вЂ” kernel bottleneck only в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      #    Records only your kernel functions, not the whole binary.
      #    Shows:
      #      - % time in macro_kernel vs pack_A vs pack_B
      #      - which AVX2 instructions dominate inside macro_kernel
      #      - IPC, L1 misses, LLC misses at large N
      - name: Profile kernel bottleneck
        run: |
          source /opt/intel/oneapi/setvars.sh
          export LD_LIBRARY_PATH=$MKLROOT/lib/intel64:$LD_LIBRARY_PATH
          export DNNL_MAX_CPU_ISA=AVX2
          export OMP_NUM_THREADS=$NCORES

          # record with dwarf call graph for full symbol resolution
          perf record -g --call-graph=dwarf -o perf.data ./matmul \
            2>/dev/null || true

          echo "=== TOP FUNCTIONS (your kernel only) ===" \
            | tee perf_report.txt

          # show % split between your kernel functions
          perf report --stdio --no-children -i perf.data 2>/dev/null \
            | grep -E "macro_kernel|pack_A|pack_B|kernel\b" \
            | grep -v "dnnl\|mkl\|gomp\|libc\|clone\|start" \
            | head -15 | tee -a perf_report.txt

          echo "" | tee -a perf_report.txt
          echo "=== INSIDE macro_kernel (instruction breakdown) ===" \
            | tee -a perf_report.txt

          # show which instructions burn cycles inside macro_kernel
          perf report --stdio --no-children -i perf.data 2>/dev/null \
            | grep -A 30 "macro_kernel" \
            | grep -E "maddubs|madd_epi|add_epi|loadu|set1|storeu|prefetch|\%" \
            | head -20 | tee -a perf_report.txt

          echo "" | tee -a perf_report.txt
          echo "=== PERF STAT вЂ” IPC and cache misses ===" \
            | tee -a perf_report.txt

          # clean stat run for IPC/cache numbers
          perf stat \
            -e cycles,instructions,L1-dcache-load-misses,LLC-load-misses \
            ./matmul 2>&1 \
            | grep -E "cycles|instructions|insn|L1|LLC" \
            | tee -a perf_report.txt

          echo "" | tee -a perf_report.txt
          echo "=== INTERPRETATION ===" | tee -a perf_report.txt
          echo "IPC < 1.0  в†’ stall-bound (memory or dependency)" \
            | tee -a perf_report.txt
          echo "IPC > 2.0  в†’ compute-bound (good utilization)" \
            | tee -a perf_report.txt
          echo "LLC misses high в†’ data not in cache, need better blocking" \
            | tee -a perf_report.txt
          echo "L1 misses high  в†’ micro-kernel reuse ratio too low" \
            | tee -a perf_report.txt

      # в”Ђв”Ђ 13. Generate plot в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Generate performance plot
        run: python3 plot.py

      # в”Ђв”Ђ 14. Upload all artifacts в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-avx2-only
          path: |
            autotune_log.txt
            benchmark_output.txt
            benchmark_results.csv
            performance_plot.png
            perf_report.txt