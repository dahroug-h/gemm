name: Benchmark Matmul (AVX2-only, Industry Standard)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Cache apt packages ──────────────────────────────────
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/benchmark.yml') }}
          restore-keys: apt-${{ runner.os }}-

      # ── 3. Cache Intel MKL ─────────────────────────────────────
      - name: Cache Intel MKL
        id: cache-mkl
        uses: actions/cache@v4
        with:
          path: /opt/intel/oneapi
          key: mkl-oneapi-ubuntu22-2024
          restore-keys: mkl-oneapi-ubuntu22-

      # ── 4. Detect CPU and Set Env ──────────────────────────────
      - name: Print CPU info and Setup Environment
        run: |
          echo "=== CPU Model ==="
          CPU_NAME=$(lscpu | grep "Model name" | cut -d':' -f2 | xargs)
          echo "CPU_MODEL=$CPU_NAME" >> $GITHUB_ENV
          echo "Using CPU: $CPU_NAME"
          echo ""
          echo "=== Cores / Threads ==="
          NCORES=$(nproc)
          echo "Logical CPUs available: $NCORES"
          echo "NCORES=$NCORES" >> $GITHUB_ENV
          echo "OMP_NUM_THREADS=$NCORES" >> $GITHUB_ENV

      # ── 5. Install system dependencies + perf tools ───────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ libgomp1 python3-pip libdnnl-dev \
            libbenchmark-dev \
            linux-tools-common linux-tools-generic linux-tools-$(uname -r)
          sudo sh -c 'echo 0 > /proc/sys/kernel/perf_event_paranoid'
          sudo sh -c 'echo 0 > /proc/sys/kernel/kptr_restrict'

      # ── 6. Install Intel MKL (skipped if cached) ───────────────
      - name: Install Intel MKL
        if: steps.cache-mkl.outputs.cache-hit != 'true'
        run: |
          echo "MKL not cached — installing..."
          wget -q https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          sudo apt-key add GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          echo "deb https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update -qq
          sudo apt-get install -y intel-oneapi-mkl-devel
          echo "✅ MKL installed"

      - name: Setup MKL
        run: |
          echo "✅ MKL ready at /opt/intel/oneapi"
          ls /opt/intel/oneapi/setvars.sh

      # ── 7. Install Python packages ─────────────────────────────
      - name: Install Python packages
        run: pip3 install matplotlib numpy pandas

      # ── 8. Build and Run Autotuner ─────────────────────────────
      - name: Build autotuner
        run: |
          gcc autotuner/autotune.c \
            -I. -O3 -march=core-avx2 -mavx2 -mno-avx512f \
            -fopenmp -DNTHREADS=$NCORES \
            -o autotune -lm -lpthread

      - name: Run autotuner
        run: |
          export OMP_NUM_THREADS=$NCORES
          ./autotune 2>&1 | tee autotune_log.txt
          read BEST_MC BEST_NC BEST_KC BEST_PA1 BEST_PB1 BEST_PA2 BEST_PB2 < /tmp/autotune_result.txt
          echo "BEST_MC=$BEST_MC" >> $GITHUB_ENV
          echo "BEST_NC=$BEST_NC" >> $GITHUB_ENV
          echo "BEST_KC=$BEST_KC" >> $GITHUB_ENV
          echo "BEST_PA1=$BEST_PA1" >> $GITHUB_ENV
          echo "BEST_PB1=$BEST_PB1" >> $GITHUB_ENV
          echo "BEST_PA2=$BEST_PA2" >> $GITHUB_ENV
          echo "BEST_PB2=$BEST_PB2" >> $GITHUB_ENV

      # ── 9. Compile and Run Custom Benchmark (matmul.c) ─────────
      - name: Compile and Run Custom Benchmark
        run: |
          source /opt/intel/oneapi/setvars.sh
          gcc -g -fopenmp src/matmul.c \
            -O3 -march=core-avx2 -mavx2 -mno-avx512f \
            -DMC=$BEST_MC -DNC=$BEST_NC -DKC=$BEST_KC \
            -DPREFETCH_A_L1=$BEST_PA1 -DPREFETCH_B_L1=$BEST_PB1 \
            -DPREFETCH_A_L2=$BEST_PA2 -DPREFETCH_B_L2=$BEST_PB2 \
            -DNTHREADS=$NCORES \
            -I$MKLROOT/include -L$MKLROOT/lib/intel64 \
            -lmkl_rt -ldnnl -lpthread -lm -ldl -o matmul
          
          export LD_LIBRARY_PATH=$MKLROOT/lib/intel64:$LD_LIBRARY_PATH
          export DNNL_MAX_CPU_ISA=AVX2
          export OMP_NUM_THREADS=$NCORES
          ./matmul | tee benchmark_output.txt

      # ── 10. Build and Run Google Benchmark ─────────────────────
      - name: Build and Run Google Benchmark
        run: |
          source /opt/intel/oneapi/setvars.sh
          export LD_LIBRARY_PATH=$MKLROOT/lib/intel64:$LD_LIBRARY_PATH
          export DNNL_MAX_CPU_ISA=AVX2
          export OMP_NUM_THREADS=$NCORES

          # تم إضافة -ldnnl عشان يقدر يقرأ دوال إنتل للمقارنة
          g++ -O3 -march=core-avx2 -fopenmp \
            benchmarks/google_benchmark.cpp -o google_bench \
            -DMC=$BEST_MC -DNC=$BEST_NC -DKC=$BEST_KC \
            -DPREFETCH_A_L1=$BEST_PA1 -DPREFETCH_B_L1=$BEST_PB1 \
            -DPREFETCH_A_L2=$BEST_PA2 -DPREFETCH_B_L2=$BEST_PB2 \
            -I./src -I$MKLROOT/include -L$MKLROOT/lib/intel64 \
            -lbenchmark -ldnnl -lpthread -lm
          
          # استخراج النتائج في ملف JSON
          ./google_bench --benchmark_out=google_results.json --benchmark_out_format=json

      # ── 11. Perf profiling ─────────────────────────────────────
      - name: Profile kernel bottleneck
        run: |
          source /opt/intel/oneapi/setvars.sh
          export LD_LIBRARY_PATH=$MKLROOT/lib/intel64:$LD_LIBRARY_PATH
          export DNNL_MAX_CPU_ISA=AVX2
          export OMP_NUM_THREADS=$NCORES

          perf record -g --call-graph=dwarf -o perf.data ./matmul 2>/dev/null || true
          
          echo "=== TOP FUNCTIONS ===" | tee perf_report.txt
          perf report --stdio --no-children -i perf.data 2>/dev/null \
            | grep -E "macro_kernel|pack_A|pack_B|kernel\b" \
            | grep -v "dnnl\|mkl\|gomp\|libc\|clone\|start" \
            | head -15 | tee -a perf_report.txt

          perf stat -e cycles,instructions,L1-dcache-load-misses,LLC-load-misses \
            ./matmul 2>&1 | grep -E "cycles|instructions|insn|L1|LLC" | tee -a perf_report.txt

      # ── 12. Generate All Plots ─────────────────────────────────
      - name: Generate performance plots
        run: |
          export CPU_MODEL="${{ env.CPU_MODEL }}"
          python3 scripts/plot.py
          python3 scripts/plot_google.py

      # ── 13. Upload all artifacts ───────────────────────────────
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-professional-results
          path: |
            autotune_log.txt
            benchmark_output.txt
            benchmark_results.csv
            google_results.json
            performance_plot.png
            google_bench_plot.png
            perf_report.txt