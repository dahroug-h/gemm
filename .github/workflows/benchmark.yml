name: Benchmark Matmul (AVX2-only, Industry Standard)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Cache apt packages ──────────────────────────────────
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/benchmark.yml') }}
          restore-keys: apt-${{ runner.os }}-

      # ── 3. Cache Intel MKL ─────────────────────────────────────
      - name: Cache Intel MKL
        id: cache-mkl
        uses: actions/cache@v4
        with:
          path: /opt/intel/oneapi
          key: mkl-oneapi-ubuntu22-2024
          restore-keys: mkl-oneapi-ubuntu22-

      # ── 4. Detect CPU and Set Env ──────────────────────────────
      - name: Print CPU info and Setup Environment
        run: |
          CPU_NAME=$(lscpu | grep "Model name" | cut -d':' -f2 | xargs)
          echo "CPU_MODEL=$CPU_NAME" >> $GITHUB_ENV
          echo "NCORES=$(nproc)" >> $GITHUB_ENV

      # ── 5. Install system dependencies + perf tools ───────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ libgomp1 python3-pip libdnnl-dev \
            libbenchmark-dev linux-tools-common linux-tools-generic linux-tools-$(uname -r)
          sudo sh -c 'echo 0 > /proc/sys/kernel/perf_event_paranoid'
          sudo sh -c 'echo 0 > /proc/sys/kernel/kptr_restrict'

      # ── 6. Install Intel MKL (skipped if cached) ───────────────
      - name: Install Intel MKL
        if: steps.cache-mkl.outputs.cache-hit != 'true'
        run: |
          wget -q https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          sudo apt-key add GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          echo "deb https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update -qq
          sudo apt-get install -y intel-oneapi-mkl-devel

      # ── 7. Install Python packages ─────────────────────────────
      - name: Install Python packages
        run: pip3 install matplotlib numpy pandas

      # ── 8. Build and Run Autotuner ─────────────────────────────
      - name: Run autotuner
        run: |
          gcc autotuner/autotune.c -I. -O3 -march=core-avx2 -fopenmp -o autotune -lm
          ./autotune
          read BEST_MC BEST_NC BEST_KC BEST_PA1 BEST_PB1 BEST_PA2 BEST_PB2 < /tmp/autotune_result.txt
          echo "BEST_MC=$BEST_MC" >> $GITHUB_ENV
          echo "BEST_NC=$BEST_NC" >> $GITHUB_ENV
          echo "BEST_KC=$BEST_KC" >> $GITHUB_ENV
          echo "BEST_PA1=$BEST_PA1" >> $GITHUB_ENV
          echo "BEST_PB1=$BEST_PB1" >> $GITHUB_ENV
          echo "BEST_PA2=$BEST_PA2" >> $GITHUB_ENV
          echo "BEST_PB2=$BEST_PB2" >> $GITHUB_ENV

      # ── 9. Compile Both Kernels (Standard & Robust) ────────────
      - name: Compile matmul binaries
        run: |
          source /opt/intel/oneapi/setvars.sh --force || [[ $? -eq 40 ]]
          # 1. Compile Standard version
          gcc -g -fopenmp src/matmul.c -O3 -march=core-avx2 \
            -DMC=$BEST_MC -DNC=$BEST_NC -DKC=$BEST_KC \
            -DPREFETCH_A_L1=$BEST_PA1 -DPREFETCH_B_L1=$BEST_PB1 \
            -DPREFETCH_A_L2=$BEST_PA2 -DPREFETCH_B_L2=$BEST_PB2 \
            -I$MKLROOT/include -L$MKLROOT/lib/intel64 -lmkl_rt -ldnnl -o matmul
          
          # 2. Compile Robust version using the "Swap Trick"
          mv src/kernel.h src/kernel_std.h
          cp src/kernel_robust.h src/kernel.h
          gcc -g -fopenmp src/matmul.c -O3 -march=core-avx2 \
            -DMC=$BEST_MC -DNC=$BEST_NC -DKC=$BEST_KC \
            -DPREFETCH_A_L1=$BEST_PA1 -DPREFETCH_B_L1=$BEST_PB1 \
            -DPREFETCH_A_L2=$BEST_PA2 -DPREFETCH_B_L2=$BEST_PB2 \
            -I$MKLROOT/include -L$MKLROOT/lib/intel64 -lmkl_rt -ldnnl -o matmul_robust
          mv src/kernel_std.h src/kernel.h

      # ── 10. Run All Benchmarks ─────────────────────────────────
      - name: Run matmul benchmarks
        run: |
          source /opt/intel/oneapi/setvars.sh --force || [[ $? -eq 40 ]]
          export LD_LIBRARY_PATH=$MKLROOT/lib/intel64:$LD_LIBRARY_PATH
          export OMP_NUM_THREADS=$NCORES
          
          # Run Standard
          ./matmul > standard_output.txt
          mv benchmark_results.csv standard_results.csv
          
          # Run Robust
          ./matmul_robust > robust_output.txt
          mv benchmark_results.csv robust_results.csv

      # ── 11. Google Benchmark (With Robustness Test) ───────────
      - name: Run Google Benchmark
        run: |
          source /opt/intel/oneapi/setvars.sh --force || [[ $? -eq 40 ]]
          g++ -O3 -march=core-avx2 -fopenmp benchmarks/google_benchmark.cpp -o google_bench \
            -DMC=$BEST_MC -DNC=$BEST_NC -DKC=$BEST_KC -I./src -I$MKLROOT/include \
            -L$MKLROOT/lib/intel64 -lbenchmark -ldnnl -lpthread -lm
          # Filter ensures we test the extreme range failure zone
          ./google_bench --benchmark_out=google_results.json --benchmark_out_format=json \
            --benchmark_filter="BM_MyKernel|BM_OneDNN|BM_ExtremeRange_Accuracy"

      # ── 12. Profiling & Plots ──────────────────────────────────
      - name: Profile and Plot
        run: |
          source /opt/intel/oneapi/setvars.sh --force || [[ $? -eq 40 ]]
          export LD_LIBRARY_PATH=$MKLROOT/lib/intel64:$LD_LIBRARY_PATH
          perf stat ./matmul 2>&1 | tee perf_report.txt
          export CPU_MODEL="${{ env.CPU_MODEL }}"
          python3 scripts/plot.py
          python3 scripts/plot_google.py

      # ── 13. Upload All Artifacts ───────────────────────────────
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: gemm-robust-results
          path: |
            standard_results.csv
            robust_results.csv
            google_results.json
            performance_plot.png
            google_bench_plot.png
            perf_report.txt