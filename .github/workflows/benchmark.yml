name: Benchmark Matmul (Autotune + Any CPU)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Print full CPU info ─────────────────────────────────
      - name: Print CPU info
        run: |
          echo "=== CPU Model ==="
          lscpu | grep "Model name"
          echo ""
          echo "=== Cache sizes ==="
          lscpu | grep -i cache
          echo ""
          echo "=== Cores / Threads ==="
          lscpu | grep -E "^CPU\(s\)|Thread|Core"
          echo ""
          echo "=== AVX flags ==="
          grep -o 'avx[^ ]*' /proc/cpuinfo | sort -u | head -20
          echo ""
          echo "=== AVX2 check ==="
          grep -o 'avx2' /proc/cpuinfo | head -1 \
            && echo "AVX2: YES" || echo "AVX2: NOT FOUND"
          echo ""
          echo "=== AVX512 check ==="
          grep -o 'avx512f' /proc/cpuinfo | head -1 \
            && echo "AVX512: present (will compile AVX2-only anyway)" \
            || echo "AVX512: not present — pure AVX2 machine"

      # ── 3. Install system dependencies ────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libgomp1 python3-pip libdnnl-dev

      # ── 4. Install Intel MKL ───────────────────────────────────
      - name: Install Intel MKL
        run: |
          wget -q https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          sudo apt-key add GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          echo "deb https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update -qq
          sudo apt-get install -y intel-oneapi-mkl-devel

      # ── 5. Install Python packages ─────────────────────────────
      - name: Install Python packages
        run: pip3 install matplotlib numpy pandas

      # ── 6. Build autotuner ────────────────────────────────────
      - name: Build autotuner
        run: |
          gcc autotune.c -O2 -o autotune -lm
          echo "✅ autotune compiled"

      # ── 7. Run autotuner → get best MC/NC/KC for THIS machine ─
      #    This is the key step: it benchmarks across sizes
      #    256, 512, 1024, 2048, 3072, 4000 and picks the blocking
      #    parameters with the best harmonic-mean GOPS score.
      #    Results are written to /tmp/autotune_result.txt as:
      #       <MC> <NC> <KC>
      - name: Run autotuner
        run: |
          echo "Starting autotune — this takes a few minutes..."
          ./autotune 2>&1 | tee autotune_log.txt
          echo ""
          echo "=== Autotune result ==="
          cat /tmp/autotune_result.txt

      # ── 8. Patch kernel.h with the new MC/NC/KC ───────────────
      #    Reads the three values from /tmp/autotune_result.txt
      #    and does an in-place sed replacement of the #define lines
      #    in kernel.h so matmul.c picks them up automatically.
      - name: Patch kernel.h with best blocking parameters
        run: |
          read BEST_MC BEST_NC BEST_KC < /tmp/autotune_result.txt

          echo "Patching kernel.h:"
          echo "  MC = $BEST_MC"
          echo "  NC = $BEST_NC"
          echo "  KC = $BEST_KC"

          # Show old values
          echo ""
          echo "=== kernel.h BEFORE patch ==="
          grep -E "^#define (MC|NC|KC)" kernel.h

          # Patch — handles any existing value after the define
          sed -i "s/^#define MC[[:space:]].*/#define MC  $BEST_MC/" kernel.h
          sed -i "s/^#define NC[[:space:]].*/#define NC  $BEST_NC/" kernel.h
          sed -i "s/^#define KC[[:space:]].*/#define KC  $BEST_KC/" kernel.h

          # Verify
          echo ""
          echo "=== kernel.h AFTER patch ==="
          grep -E "^#define (MC|NC|KC)" kernel.h
          echo "✅ kernel.h patched"

      # ── 9. Compile matmul with patched kernel.h ───────────────
      #    Use -mavx2 -mno-avx512f so even if the runner has AVX512
      #    the binary is AVX2-only — same instruction set as your
      #    i5-10300H. Fair comparison against oneDNN on any machine.
      - name: Compile matmul
        run: |
          source /opt/intel/oneapi/setvars.sh
          gcc -g -fopenmp matmul.c \
            -O3 -mavx2 -mno-avx512f \
            -I$MKLROOT/include \
            -L$MKLROOT/lib/intel64 \
            -lmkl_rt -ldnnl -lpthread -lm -ldl \
            -o matmul
          echo "✅ matmul compiled"

      # ── 10. Run benchmark ──────────────────────────────────────
      - name: Run benchmark
        run: |
          source /opt/intel/oneapi/setvars.sh
          export LD_LIBRARY_PATH=$MKLROOT/lib/intel64:$LD_LIBRARY_PATH
          echo "=== Running on: $(lscpu | grep 'Model name' | awk -F: '{print $2}' | xargs) ==="
          echo "=== Threads available: $(nproc) ==="
          echo ""
          ./matmul | tee benchmark_output.txt

      # ── 11. Generate plot ──────────────────────────────────────
      - name: Generate performance plot
        run: python3 plot.py

      # ── 12. Upload everything ──────────────────────────────────
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-autotuned
          path: |
            autotune_log.txt
            benchmark_output.txt
            benchmark_results.csv
            performance_plot.png
            kernel.h